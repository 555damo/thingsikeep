<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things I Keep</title>
  <meta name="description" content="Music, places, objects, books — the things that stayed.">
  <meta property="og:type"        content="article">
  <meta property="og:site_name"   content="The Kept List">
  <meta property="og:title"       content="Things I Keep">
  <meta property="og:description" content="Music, places, objects, books — the things that stayed.">
  <meta property="og:url"         content="https://thekeptlist.com">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:title"      content="Things I Keep">
  <meta name="twitter:description" content="Music, places, objects, books — the things that stayed.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:          #F0EAE0;
      --parchment:      #E6DDD0;
      --parchment-deep: #D8CDB9;
      --terracotta:     #B8724E;
      --terracotta-light: #E8CDB8;
      --sand:           #C8B9A2;
      --ink:            #1C1814;
      --text-body:      #3E3630;
      --text-muted:     #5E5248;
      --cat-terra:      #7A3E22;
      --cat-sage:       #3E5830;
      --cat-gold:       #665018;
      --cat-food:       #6A4820;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      mix-blend-mode: multiply;
    }

    /* ── Skip link ── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .skip-link {
      position: absolute; top: -100%; left: 16px; z-index: 10000;
      padding: 8px 16px; background: var(--ink); color: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      letter-spacing: 0.05em; text-decoration: none;
      border-radius: 0 0 4px 4px;
    }
    .skip-link:focus { top: 0; outline: 2px solid var(--terracotta); outline-offset: 2px; }

    /* ── Sticky nav ── */
    .page-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(240, 234, 224, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--sand);
    }
    .back-link {
      font-family: 'DM Sans', sans-serif; font-size: 10.5px;
      font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 10px;
      transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--ink); }
    .back-link:focus-visible { outline: 2px solid var(--cat-terra); outline-offset: 3px; border-radius: 2px; }
    .back-link-arrow { font-size: 14px; }
    .nav-site { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--text-muted); }

    /* ── Visual swatch classes (same as index) ── */
    .visual-music       { background: linear-gradient(145deg, #1E1412 0%, #2E1F18 40%, #1A1210 100%); }
    .visual-music-2     { background: linear-gradient(145deg, #2A1E28 0%, #1E1622 50%, #120E18 100%); }
    .visual-travel-warm { background: linear-gradient(135deg, #C8A87E 0%, #A8845A 40%, #8A6840 100%); }
    .visual-travel-blue { background: linear-gradient(135deg, #3A5570 0%, #4E6E8A 50%, #2A3F52 100%); }
    .visual-books       { background: linear-gradient(145deg, #C8B89A 0%, #D4C4A4 50%, #B8A888 100%); }
    .visual-products    { background: linear-gradient(145deg, #DDD4C2 0%, #E4DAC8 60%, #C8BEA8 100%); }
    .visual-style-light { background: linear-gradient(145deg, #DDD4C4 0%, #E8E0D0 50%, #C8BEB0 100%); }
    .visual-style-dark  { background: linear-gradient(145deg, #1C1814 0%, #282018 60%, #141010 100%); }
    .visual-food        { background: linear-gradient(135deg, #9A7848 0%, #7A5C34 50%, #B89060 100%); }

    /* ── Hero (music / travel / style / food) ── */
    .hero {
      position: relative; overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .hero-bg {
      position: absolute; inset: 0;
    }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .hero-grain {
      position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 120px 120px; mix-blend-mode: overlay;
    }
    .hero-scrim {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to top, rgba(14, 10, 8, 0.72) 0%, rgba(14, 10, 8, 0.2) 60%, transparent 100%);
    }
    .hero-content {
      position: relative; z-index: 3;
      width: 100%; padding: 48px 48px 52px;
    }
    .hero-cat {
      display: block;
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(240, 234, 224, 0.65);
      margin-bottom: 10px;
    }
    .hero-label {
      display: block;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240, 234, 224, 0.55); margin-bottom: 8px;
    }
    .hero-artist {
      font-family: 'Cormorant Garamond', serif; font-size: 18px;
      font-weight: 300; color: rgba(240, 234, 224, 0.8);
      margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300; letter-spacing: -0.025em; line-height: 1.05;
      color: #F0EAE0;
      margin-bottom: 16px;
    }
    .hero-title-italic { font-style: italic; }
    .hero-meta {
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      font-weight: 300; letter-spacing: 0.12em;
      color: rgba(240, 234, 224, 0.6);
    }
    .hero-season {
      display: inline-block;
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(240, 234, 224, 0.7);
      border: 1px solid rgba(240, 234, 224, 0.3);
      padding: 3px 10px;
      margin-bottom: 16px;
    }

    /* ── Detail body ── */
    .detail-body { padding: 56px 32px 80px; }
    .detail-inner { max-width: 960px; margin: 0 auto; }
    .detail-inner-narrow { max-width: 800px; margin: 0 auto; }

    /* ── Two columns ── */
    .two-col {
      display: grid; gap: 48px;
      grid-template-columns: 3fr 2fr;
    }
    .two-col-even { grid-template-columns: 1fr 1fr; }
    .two-col-recipe { grid-template-columns: 2fr 3fr; }

    @media (max-width: 720px) {
      .two-col, .two-col-even, .two-col-recipe {
        grid-template-columns: 1fr; gap: 32px;
      }
    }

    /* ── Three columns ── */
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 720px) { .three-col { grid-template-columns: 1fr; } }

    /* ── Section label ── */
    .section-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 16px; display: block;
    }

    /* ── Note text ── */
    .detail-note-text {
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      font-weight: 300; line-height: 1.85;
      color: var(--text-body);
    }

    /* ── Attribute dl ── */
    .attr-list { display: grid; grid-template-columns: auto 1fr; gap: 8px 20px; }
    .attr-list dt {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); padding-top: 2px; white-space: nowrap;
    }
    .attr-list dd {
      font-family: 'Cormorant Garamond', serif; font-size: 15px;
      color: var(--ink); line-height: 1.35;
    }

    /* ── Tags ── */
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
    .tag {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted); border: 1px solid var(--sand);
      padding: 3px 10px;
    }

    /* ── Listen note ── */
    .listen-note {
      margin-top: 40px; padding: 24px 28px;
      border-left: 2px solid var(--terracotta);
      background: var(--parchment);
    }
    .listen-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--cat-terra); display: block; margin-bottom: 8px;
    }
    .listen-text {
      font-family: 'Cormorant Garamond', serif; font-size: 18px;
      font-style: italic; color: var(--ink); line-height: 1.5;
    }

    /* ── Related list ── */
    .related-list {
      list-style: none;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
      border: 1px solid var(--sand); margin-top: 0;
    }
    @media (max-width: 600px) { .related-list { grid-template-columns: 1fr; } }

    .related-item {
      background: var(--parchment);
      padding: 18px 20px;
    }
    .related-item-label {
      font-family: 'DM Sans', sans-serif; font-size: 8.5px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 6px;
    }
    .related-item-title {
      font-family: 'Cormorant Garamond', serif; font-size: 16px;
      color: var(--ink); line-height: 1.3;
    }

    /* ── Section divider ── */
    .section-divider {
      border: none; border-top: 1px solid var(--parchment-deep);
      margin: 48px 0;
    }

    /* ── Travel: tagline ── */
    .travel-tagline {
      text-align: center; padding: 48px 32px 40px;
      max-width: 640px; margin: 0 auto;
    }
    .travel-tagline-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 3vw, 32px);
      font-style: italic; font-weight: 300; line-height: 1.4;
      color: var(--ink); letter-spacing: -0.01em;
    }

    /* ── Travel: meta cell ── */
    .meta-cell { padding: 4px 0; }
    .meta-cell-label {
      font-family: 'DM Sans', sans-serif; font-size: 8.5px;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 8px;
      padding-bottom: 8px; border-bottom: 1px solid var(--sand);
    }
    .meta-cell-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; color: var(--ink); line-height: 1.5;
    }

    /* ── Tip box ── */
    .tip-box {
      margin-top: 40px; padding: 20px 24px;
      border-left: 2px solid var(--terracotta);
      background: var(--parchment);
    }
    .tip-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--cat-terra); display: block; margin-bottom: 8px;
    }
    .tip-text {
      font-family: 'Cormorant Garamond', serif; font-size: 17px;
      font-style: italic; color: var(--ink); line-height: 1.55;
    }

    /* ── Books: header ── */
    .books-header {
      padding: 72px 32px 56px; text-align: center;
      max-width: 760px; margin: 0 auto;
    }
    .books-author {
      font-family: 'DM Sans', sans-serif; font-size: 10px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 20px;
    }
    .books-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 300; letter-spacing: -0.03em; line-height: 1.0;
      color: var(--ink); margin-bottom: 20px;
    }
    .books-title em { font-style: italic; }
    .books-pub {
      font-family: 'Cormorant Garamond', serif; font-size: 14px;
      font-style: italic; color: var(--text-muted);
    }

    /* ── Books: passage ── */
    .passage-block {
      background: var(--parchment); padding: 32px 36px;
    }
    .passage-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 16px;
    }
    blockquote.passage {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px; font-style: italic; font-weight: 300;
      line-height: 1.55; color: var(--ink);
    }
    blockquote.passage::before {
      content: '\201C';
      font-size: 56px; line-height: 0.5;
      color: var(--terracotta-light);
      display: block; margin-bottom: 12px;
    }
    .passage-context {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-top: 16px;
    }

    /* ── Objects: product visual ── */
    .product-visual-wrap {
      display: flex; justify-content: center; padding: 48px 32px 0;
    }
    .product-visual {
      width: 100%; max-width: 480px; height: 260px;
      position: relative; overflow: hidden;
    }
    .product-visual-bg {
      position: absolute; inset: 0;
    }
    .product-visual-grain {
      position: absolute; inset: 0; opacity: 0.1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 100px 100px; mix-blend-mode: overlay;
    }
    .product-header { text-align: center; padding: 28px 32px 0; }
    .product-brand {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 10px;
    }
    .product-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3.5vw, 42px);
      font-weight: 300; letter-spacing: -0.02em; line-height: 1.1;
      color: var(--ink);
    }

    /* ── Objects: 4-cell grid ── */
    .attr-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 1px; background: var(--sand);
      border: 1px solid var(--sand); margin-top: 40px;
    }
    @media (min-width: 600px) { .attr-grid { grid-template-columns: repeat(4, 1fr); } }
    .attr-grid-cell {
      background: var(--parchment); padding: 18px 20px;
    }
    .attr-grid-label {
      font-family: 'DM Sans', sans-serif; font-size: 8.5px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 8px;
    }
    .attr-grid-value {
      font-family: 'Cormorant Garamond', serif; font-size: 16px;
      color: var(--ink); line-height: 1.3;
    }

    /* ── Objects: verdict ── */
    .verdict-block {
      margin-top: 32px; padding: 20px 24px;
      border-left: 2px solid var(--parchment-deep);
    }
    .verdict-text {
      font-family: 'Cormorant Garamond', serif; font-size: 18px;
      font-style: italic; color: var(--text-body); line-height: 1.5;
    }

    /* ── Style: The Rule ── */
    .rule-block {
      margin-top: 52px;
      padding: 40px 32px;
      text-align: center; position: relative;
    }
    .rule-block::before, .rule-block::after {
      content: '';
      position: absolute;
      left: 50%; transform: translateX(-50%);
      width: 60px; height: 1px; background: var(--sand);
    }
    .rule-block::before { top: 0; }
    .rule-block::after  { bottom: 0; }
    .rule-label {
      font-family: 'DM Sans', sans-serif; font-size: 8.5px;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 20px;
    }
    .rule-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 2.8vw, 30px);
      font-style: italic; font-weight: 300; line-height: 1.4;
      color: var(--ink); max-width: 600px; margin: 0 auto;
      letter-spacing: -0.01em;
    }

    /* ── Food: badges ── */
    .recipe-badges { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
    .recipe-badge {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); border: 1px solid var(--sand);
      padding: 5px 14px;
    }

    /* ── Food: intro ── */
    .recipe-intro {
      text-align: center; max-width: 600px; margin: 0 auto 48px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-style: italic; font-weight: 300;
      line-height: 1.55; color: var(--text-body);
    }

    /* ── Food: ingredients ── */
    .ingredients-list {
      list-style: none; border-top: 1px solid var(--sand);
    }
    .ingredients-list li {
      font-family: 'DM Sans', sans-serif; font-size: 12.5px;
      font-weight: 300; color: var(--text-body);
      line-height: 1.6; padding: 10px 0;
      border-bottom: 1px solid var(--parchment-deep);
      display: flex; gap: 10px; align-items: baseline;
    }
    .ingredients-list li::before {
      content: '—'; color: var(--sand);
      font-size: 10px; flex-shrink: 0; padding-top: 2px;
    }

    /* ── Food: method ── */
    .method-list {
      list-style: none; counter-reset: step-counter;
    }
    .method-list li {
      counter-increment: step-counter;
      display: grid; grid-template-columns: 36px 1fr; gap: 16px;
      align-items: baseline;
      padding: 20px 0; border-bottom: 1px solid var(--parchment-deep);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 300; line-height: 1.8; color: var(--text-body);
    }
    .method-list li::before {
      content: counter(step-counter);
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 300; color: var(--parchment-deep);
      line-height: 1; text-align: right;
    }

    /* ── Food: serving + variations ── */
    .serving-block, .variations-block {
      background: var(--parchment); padding: 24px 28px;
    }
    .serving-label, .variations-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); display: block; margin-bottom: 10px;
    }
    .serving-text, .variations-text {
      font-family: 'Cormorant Garamond', serif; font-size: 16px;
      font-style: italic; color: var(--ink); line-height: 1.6;
    }

    /* ── Footer ── */
    .site-footer {
      text-align: center; padding: 28px 24px 48px;
      border-top: 1px solid var(--parchment-deep);
    }
    .footer-text {
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      font-style: italic; color: var(--text-muted);
    }

    /* ── Not found ── */
    .not-found {
      text-align: center; padding: 120px 32px;
      font-family: 'Cormorant Garamond', serif; font-size: 20px;
      font-style: italic; color: var(--text-muted);
    }
    .not-found a {
      display: block; margin-top: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--cat-terra); text-decoration: none;
    }

    /* ── Page share button (in sticky nav) ── */
    .page-share {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 9.5px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
      padding: 6px 0;
      transition: color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .page-share:hover { color: var(--ink); }

          <section aria-label="Related listening">
            <h2 class="section-label">Related listening</h2>
            <ul class="related-list" role="list">
              ${related}
            </ul>
          </section>

        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     RENDER: TRAVEL
  ───────────────────────────────────────── */
  function renderTravel(item) {
    const related = item.nearby.split(' · ').map(r => `
      <li class="related-item">
        <span class="related-item-label">Nearby</span>
        <span class="related-item-title">${esc(r)}</span>
      </li>`).join('');

    return `
      <div class="hero ${esc(item.visual)}" style="height:58vh; min-height:360px;">
        <div class="hero-bg ${esc(item.visual)}" aria-hidden="true" role="presentation"></div>
        ${item.image ? `<img class="hero-img" src="${esc(item.image)}" alt="" aria-hidden="true">` : ''}
        <div class="hero-grain" aria-hidden="true" role="presentation"></div>
        <div class="hero-scrim" aria-hidden="true" role="presentation"></div>
        <div class="hero-content">
          <span class="hero-season">${esc(item.season)}</span>
          <p class="hero-label">${esc(item.country)}</p>
          <h1 class="hero-title">${esc(item.title)}</h1>
        </div>
      </div>

      <main id="main-content">
        <div class="travel-tagline">
          <p class="travel-tagline-text"><em>${esc(item.tagline)}</em></p>
        </div>

        <div class="detail-body" style="padding-top:0;">
          <div class="detail-inner">

            <div class="three-col" aria-label="Key information">
              <div class="meta-cell">
                <span class="meta-cell-label">Where to go</span>
                <p class="meta-cell-value">${esc(item.neighbourhood)}</p>
              </div>
              <div class="meta-cell">
                <span class="meta-cell-label">Best time</span>
                <p class="meta-cell-value">${esc(item.bestTime)}</p>
              </div>
              <div class="meta-cell">
                <span class="meta-cell-label">Where to stay</span>
                <p class="meta-cell-value">${esc(item.stay)}</p>
              </div>
            </div>

            <hr class="section-divider" aria-hidden="true">

            <div class="two-col-even">
              <div class="meta-cell">
                <span class="meta-cell-label">What to eat</span>
                <p class="meta-cell-value">${esc(item.eat)}</p>
              </div>
              <div class="meta-cell">
                <span class="meta-cell-label">From here</span>
                <p class="meta-cell-value">${esc(item.nearby)}</p>
              </div>
            </div>

            <hr class="section-divider" aria-hidden="true">

            <div style="max-width:640px;">
              <h2 class="section-label">What I remember</h2>
              <p class="detail-note-text">${esc(item.note)}</p>
            </div>

            <div class="tip-box" role="note">
              <span class="tip-label">Worth knowing</span>
              <p class="tip-text">${esc(item.tip)}</p>
            </div>

          </div>
        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     RENDER: BOOKS
  ───────────────────────────────────────── */
  function renderBooks(item) {
    const tags  = item.themes.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const related = item.related.map(r => `
      <li class="related-item">
        <span class="related-item-label">${esc(r.label)}</span>
        <span class="related-item-title">${esc(r.title)}</span>
      </li>`).join('');

    return `
      ${item.image ? `
      <div class="hero" style="height:52vh; min-height:320px;">
        <img class="hero-img" src="${esc(item.image)}" alt="" aria-hidden="true">
        <div class="hero-grain" aria-hidden="true" role="presentation"></div>
        <div class="hero-scrim" aria-hidden="true" role="presentation"></div>
      </div>` : ''}
      <main id="main-content">
        <div class="books-header">
          <span class="books-author">${esc(item.author)}</span>
          <h1 class="books-title"><em>${esc(item.title)}</em></h1>
          <p class="books-pub">
            <time datetime="${esc(item.year)}">${esc(item.year)}</time>
            &ensp;·&ensp; ${esc(item.publisher)}
          </p>
        </div>

        <div class="detail-body" style="padding-top:0;">
          <div class="detail-inner">

            <div class="two-col">
              <div>
                <h2 class="section-label">Why it stays</h2>
                <p class="detail-note-text">${esc(item.note)}</p>
                <div class="tags-row" style="margin-top:24px;" aria-label="Themes">
                  ${tags}
                </div>
              </div>

              <div class="passage-block">
                <span class="passage-label">A passage</span>
                <blockquote class="passage">
                  ${esc(item.passage)}
                  <cite class="passage-context">${esc(item.passageContext)}</cite>
                </blockquote>
              </div>
            </div>

            <hr class="section-divider" aria-hidden="true">

            <section aria-label="Related reading">
              <h2 class="section-label">If this one stayed</h2>
              <ul class="related-list" role="list">
                ${related}
              </ul>
            </section>

          </div>
        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     RENDER: OBJECTS
  ───────────────────────────────────────── */
  function renderObjects(item) {
    return `
      <main id="main-content">
        <div class="product-visual-wrap" aria-hidden="true" role="presentation">
          <div class="product-visual">
            ${item.image
              ? `<img class="hero-img" src="${esc(item.image)}" alt="">`
              : `<div class="product-visual-bg ${esc(item.visual)}"></div>`}
            <div class="product-visual-grain"></div>
          </div>
        </div>

        <div class="product-header">
          <span class="product-brand">${esc(item.brand)}</span>
          <h1 class="product-title">${esc(item.title)}</h1>
        </div>

        <div class="detail-body">
          <div class="detail-inner">

            <div class="attr-grid" role="list" aria-label="Product details">
              <div class="attr-grid-cell" role="listitem">
                <span class="attr-grid-label">Material</span>
                <p class="attr-grid-value">${esc(item.material)}</p>
              </div>
              <div class="attr-grid-cell" role="listitem">
                <span class="attr-grid-label">Origin</span>
                <p class="attr-grid-value">${esc(item.origin)}</p>
              </div>
              <div class="attr-grid-cell" role="listitem">
                <span class="attr-grid-label">In use since</span>
                <p class="attr-grid-value">${esc(item.usedSince)}</p>
              </div>
              <div class="attr-grid-cell" role="listitem">
                <span class="attr-grid-label">Price · Where</span>
                <p class="attr-grid-value">${esc(item.price)}<br>
                  <span style="font-size:13px; color:var(--text-muted);">${esc(item.where)}</span>
                </p>
              </div>
            </div>

            <hr class="section-divider" aria-hidden="true">

            <div style="max-width:600px;">
              <h2 class="section-label">The argument for it</h2>
              <p class="detail-note-text">${esc(item.note)}</p>
            </div>

            <div class="verdict-block" role="note">
              <p class="verdict-text">${esc(item.verdict)}</p>
            </div>

          </div>
        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     RENDER: STYLE
  ───────────────────────────────────────── */
  function renderStyle(item) {
    return `
      <div class="hero ${esc(item.visual)}" style="height:52vh; min-height:320px;">
        <div class="hero-bg ${esc(item.visual)}" aria-hidden="true" role="presentation"></div>
        <div class="hero-grain" aria-hidden="true" role="presentation"></div>
        <div class="hero-scrim" aria-hidden="true" role="presentation"></div>
        <div class="hero-content">
          <span class="hero-cat">${esc(item.type)}</span>
          <h1 class="hero-title"><em class="hero-title-italic">${esc(item.title)}</em></h1>
        </div>
      </div>

      <main id="main-content" class="detail-body">
        <div class="detail-inner">

          <div class="two-col">
            <div>
              <h2 class="section-label">Why it stays</h2>
              <p class="detail-note-text">${esc(item.note)}</p>
            </div>

            <div>
              <h2 class="section-label">Details</h2>
              <dl class="attr-list">
                <dt>Material</dt><dd>${esc(item.material)}</dd>
                <dt>Fit</dt>    <dd>${esc(item.fit)}</dd>
                <dt>Colour</dt> <dd>${esc(item.colour)}</dd>
                <dt>Find it</dt><dd>${esc(item.where)}</dd>
                <dt>Care</dt>   <dd>${esc(item.care)}</dd>
              </dl>
            </div>
          </div>

          <div class="rule-block">
            <span class="rule-label" aria-hidden="true">The rule</span>
            <p class="rule-text">&ldquo;${esc(item.rule)}&rdquo;</p>
          </div>

        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     RENDER: FOOD
  ───────────────────────────────────────── */
  function renderFood(item) {
    const ingredients = item.ingredients
      .map(i => `<li>${esc(i)}</li>`).join('');
    const method = item.method
      .map(s => `<li>${esc(s)}</li>`).join('');

    return `
      <div class="hero visual-food" style="height:50vh; min-height:300px;">
        <div class="hero-bg visual-food" aria-hidden="true" role="presentation"></div>
        <div class="hero-grain" aria-hidden="true" role="presentation"></div>
        <div class="hero-scrim" aria-hidden="true" role="presentation"></div>
        <div class="hero-content">
          <span class="hero-cat">Food</span>
          <h1 class="hero-title">${esc(item.title)}</h1>
          <p class="hero-meta">${esc(item.source)}</p>
        </div>
      </div>

      <main id="main-content" class="detail-body">
        <div class="detail-inner">

          <div class="recipe-badges" role="list" aria-label="Recipe info">
            <span class="recipe-badge" role="listitem">Serves ${esc(item.serves)}</span>
            <span class="recipe-badge" role="listitem">${esc(item.time)}</span>
          </div>

          <p class="recipe-intro">${esc(item.intro)}</p>

          <div class="two-col two-col-recipe">
            <section aria-label="Ingredients">
              <h2 class="section-label">Ingredients</h2>
              <ul class="ingredients-list" role="list">
                ${ingredients}
              </ul>
            </section>

            <section aria-label="Method">
              <h2 class="section-label">Method</h2>
              <ol class="method-list">
                ${method}
              </ol>
            </section>
          </div>

          <hr class="section-divider" aria-hidden="true">

          <div class="two-col-even">
            <div class="serving-block">
              <span class="serving-label">Serving</span>
              <p class="serving-text">${esc(item.serving)}</p>
            </div>
            <div class="variations-block">
              <span class="variations-label">Variations</span>
              <p class="variations-text">${esc(item.variations)}</p>
            </div>
          </div>

        </div>
      </main>`;
  }

  /* ─────────────────────────────────────────
     ROUTING
  ───────────────────────────────────────── */
  const renderers = {
    music:    renderMusic,
    travel:   renderTravel,
    books:    renderBooks,
    products: renderObjects,
    style:    renderStyle,
    food:     renderFood,
  };

  const params = new URLSearchParams(location.search);
  const id     = params.get('item');
  const item   = id ? items[id] : null;
  const render = document.getElementById('page-render');

  function setMeta(title, description, url) {
    document.title = title;
    document.querySelector('meta[property="og:title"]').content    = title;
    document.querySelector('meta[property="og:description"]').content = description;
    document.querySelector('meta[property="og:url"]').content      = url;
    document.querySelector('meta[name="twitter:title"]').content   = title;
    document.querySelector('meta[name="twitter:description"]').content = description;
    document.querySelector('meta[name="description"]').content     = description;
  }

  if (!item) {
    document.title = 'Not found — Things I Keep';
    render.innerHTML = `
      <div class="not-found" role="alert">
        <p>This item wasn't found.</p>
        <a href="/">← Back to Things I Keep</a>
      </div>`;
  } else {
    const pageUrl = `https://thekeptlist.com/detail.html?item=${id}`;
    const desc    = item.note ? item.note.slice(0, 140).trimEnd() + '…' : 'Music, places, objects, books — the things that stayed.';
    setMeta(`${item.title} — The Kept List`, desc, pageUrl);
    render.innerHTML = renderers[item.category](item);
  }

  /* ── Highlight active category in filter nav ── */
  if (item) {
    const activeLink = document.querySelector(`.filter-btn[href="index.html?filter=${item.category}"]`);
    if (activeLink) activeLink.classList.add('active');
  }

  /* ── Share button ── */
  const shareBtn  = document.querySelector('.page-share');
  const shareLabel = shareBtn?.querySelector('.page-share-label');
  shareBtn?.addEventListener('click', async () => {
    const url   = location.href;
    const title = item ? `${item.title} — Things I Keep` : 'Things I Keep';
    try {
      if (navigator.share) {
        await navigator.share({ title, url });
      } else {
        await navigator.clipboard.writeText(url);
        shareBtn.classList.add('copied');
        shareLabel.textContent = 'Copied';
        setTimeout(() => {
          shareBtn.classList.remove('copied');
          shareLabel.textContent = 'Share';
        }, 2000);
      }
    } catch (_) {}
  });

  /* ── Search: navigate to homepage with query ── */
  const searchInput = document.querySelector('.search-input');
  searchInput?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && searchInput.value.trim()) {
      location.href = `index.html?q=${encodeURIComponent(searchInput.value.trim())}`;
    }
    if (e.key === 'Escape') searchInput.value = '';
  });
  </script>

</body>
</html>
